<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('css_style') ?>
  </head>
  <body>
    <?!= include('partials_navbar') ?>

    <div class="container">
      <div id="page-dashboard" class="page active">
        <?!= include('views_dashboard') ?>
      </div>

      <div id="page-transaction" class="page">
        <?!= include('views_transaction') ?>
      </div>

      <div id="page-report" class="page">
        <?!= include('views_report') ?>
      </div>
    </div>

    <?!= include('partials_footer') ?>

    <?!= include('js_dashboard') ?>
    <?!= include('js_transaction') ?>
    <?!= include('js_report') ?>

    <script>
      function navigateTo(page) {
        var pages = document.querySelectorAll('.page');
        for (var i = 0; i < pages.length; i++) {
          pages[i].classList.remove('active');
        }
        document.getElementById('page-' + page).classList.add('active');

        var links = document.querySelectorAll('.nav-link');
        for (var j = 0; j < links.length; j++) {
          links[j].classList.toggle('active', links[j].getAttribute('data-page') === page);
        }

        if (page === 'dashboard' && typeof loadDashboard === 'function') {
          loadDashboard();
        }
        if (page === 'report' && typeof loadReport === 'function') {
          loadReport();
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        var links = document.querySelectorAll('.nav-link');
        for (var i = 0; i < links.length; i++) {
          links[i].addEventListener('click', function () {
            navigateTo(this.getAttribute('data-page'));
          });
        }

        if (typeof loadDashboard === 'function') {
          loadDashboard();
        }
      });
    </script>
  </body>
</html>
