<style>
  :root {
    --primary: #2e7d32;
    --primary-dark: #1b5e20;
    --primary-light: #e8f5e9;
    --income: #2e7d32;
    --expense: #c62828;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text: #212121;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --radius: 14px;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .navbar {
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .navbar h1 {
    font-size: 18px;
    font-weight: 600;
  }

  .navbar nav {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .nav-link {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    background: rgba(255, 255, 255, 0.12);
    transition: background 0.2s;
    cursor: pointer;
    border: none;
  }

  .nav-link:hover,
  .nav-link.active {
    background: rgba(255, 255, 255, 0.28);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    min-height: calc(100vh - 140px);
  }

  .page {
    display: none;
  }

  .page.active {
    display: block;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  .summary-card .label {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 6px;
  }

  .summary-card .value {
    font-size: 24px;
    font-weight: 700;
  }

  .summary-card.income .value {
    color: var(--income);
  }

  .summary-card.expense .value {
    color: var(--expense);
  }

  .summary-card.balance .value {
    color: var(--primary);
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin: 18px 0 10px;
  }

  .transaction-list {
    list-style: none;
  }

  .transaction-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .transaction-item:last-child {
    border-bottom: none;
  }

  .transaction-item .info .category {
    font-weight: 600;
    font-size: 14px;
  }

  .transaction-item .info .meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .transaction-item .amount {
    font-weight: 600;
    font-size: 14px;
  }

  .transaction-item .amount.income {
    color: var(--income);
  }

  .transaction-item .amount.expense {
    color: var(--expense);
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 24px;
    font-size: 14px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: #fff;
    color: var(--text);
    transition: border 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  .form-group textarea {
    resize: vertical;
    min-height: 70px;
  }

  .radio-group {
    display: flex;
    gap: 10px;
  }

  .radio-group label {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
    margin: 0;
  }

  .radio-group input[type="radio"] {
    display: none;
  }

  .radio-group input[type="radio"]:checked + label {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover {
    background: var(--primary-dark);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--primary);
  }

  .btn-secondary:hover {
    background: var(--primary-light);
  }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
  }

  .form-row {
    display: flex;
    gap: 10px;
  }

  .form-row .form-group {
    flex: 1;
  }

  .report-summary {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .report-summary .card {
    margin-bottom: 0;
    padding: 14px;
  }

  .notification {
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 14px;
    font-size: 14px;
    font-weight: 500;
    display: none;
  }

  .notification.show {
    display: block;
  }

  .notification.success {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1px solid var(--primary);
  }

  .notification.error {
    background: #ffebee;
    color: var(--expense);
    border: 1px solid var(--expense);
  }

  .error-text {
    color: var(--expense);
    font-size: 12px;
    margin-top: 4px;
    display: none;
  }

  .error-text.show {
    display: block;
  }

  .form-group.invalid input,
  .form-group.invalid select,
  .form-group.invalid textarea {
    border-color: var(--expense);
  }

  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  .spinner.show {
    display: inline-block;
  }

  .spinner.dark {
    border-color: rgba(0, 0, 0, 0.15);
    border-top-color: var(--primary);
  }

  .loading-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.8);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 12px;
  }

  .loading-overlay.show {
    display: flex;
  }

  .loading-overlay .spinner {
    display: block;
    width: 36px;
    height: 36px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
  }

  .loading-overlay .loading-text {
    font-size: 14px;
    color: var(--text-muted);
  }

  .inline-loader {
    display: none;
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .inline-loader.show {
    display: block;
  }

  .error-banner {
    display: none;
    padding: 14px;
    border-radius: 12px;
    background: #ffebee;
    color: var(--expense);
    border: 1px solid var(--expense);
    margin-bottom: 14px;
    font-size: 14px;
  }

  .error-banner.show {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .error-banner .retry-btn {
    background: none;
    border: none;
    color: var(--expense);
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .footer {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 12px;
  }

  @media (min-width: 600px) {
    .navbar h1 {
      font-size: 20px;
    }
    .summary-card .value {
      font-size: 28px;
    }
    .report-summary {
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>
